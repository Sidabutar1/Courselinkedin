<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Course HTML</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: #f8fafc;
            --bg-card: #ffffff;
            --bg-muted: #e2e8f0;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --text-on-brand: #ffffff;
            --brand-primary: #38bdf8;
            --brand-hover: #0ea5e9;
            --shadow-color: rgba(100, 116, 139, 0.12);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            padding: 20px;
            line-height: 1.6;
        }
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 40px;
        }
        #profile-pic-container {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--bg-light);
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px var(--shadow-color);
            border: 3px solid var(--bg-card);
        }
        .hero-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--brand-primary);
        }
        #profile-pic-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }
        #profile-pic-container img.loaded {
            opacity: 1;
            transform: scale(1);
        }
        .container {
            text-align: center;
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            max-width: 700px;
            margin: auto;
            box-shadow: 0 0 20px var(--shadow-color);
            border: 1px solid var(--bg-muted);
        }
        button {
            padding: 12px 20px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            background: #f1f5f9;
            color: var(--text-dark);
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }
        button:hover {
            background: var(--brand-hover);
            color: var(--text-on-brand);
            transform: translateY(-2px);
        }
        /* Gaya untuk Navigasi Tab */
        .nav-tabs {
            text-align: center;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: #f1f5f9;
            color: var(--text-muted);
        }
        .tab-btn.active {
            background: var(--brand-primary);
            color: var(--text-on-brand);
        }
        /* Gaya untuk Modal Window */
        .modal {
            position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal.show {
            opacity: 1; pointer-events: auto;
        }
        .modal-content {
            background-color: var(--bg-card); padding: 25px; border-radius: 12px;
            width: 90%; max-width: 500px; box-shadow: 0 10px 30px var(--shadow-color);
            transform: translateY(-20px); transition: transform 0.3s ease;
            text-align: left;
        }
        .modal.show .modal-content {
            transform: translateY(0);
        }
        .close-btn {
            color: var(--text-muted); float: right; font-size: 24px; cursor: pointer; line-height: 1;
        }
        .close-btn:hover { color: var(--text-dark); }
        .modal-body-text {
            white-space: pre-wrap; line-height: 1.6; color: var(--text-muted); margin-top: 15px;
        }
        /* Animasi Transisi Konten */
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-content {
            animation: fadeSlide 0.4s ease-out;
        }
    </style>
</head>
<body>

<div class="hero-section">
    <div id="profile-pic-container">
        <!-- Gambar akan dimuat di sini oleh JavaScript -->
    </div>
    <h1>My Learning Journey</h1>
</div>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="loadContent('html', this)">HTML</button>
    <button class="tab-btn" onclick="loadContent('css', this)">CSS</button>
    <button class="tab-btn" onclick="loadContent('js', this)">JavaScript</button>
</div>

<div class="container" id="content-container">
    <h2 id="course-title">Course Details: HTML</h2>
    <p id="course-duration">Durasi: 2 jam 45 menit</p>
    <p id="course-level">Level: Beginner + Intermediate</p>
    <p id="course-release">Rilis: 27 Maret 2023</p>

    <button onclick="showDescription()">Deskripsi Course</button>
    <button onclick="showObjectives()">Learning Objectives</button>
    <button onclick="showSkills()">Skills</button>
    <button onclick="window.location.href='portofolio.html?course=' + currentCourse">Buka Portofolio</button>
</div>

<!-- Modal Window -->
<div id="custom-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modal-title" style="margin-top: 0;">Title</h3>
        <div id="modal-body" class="modal-body-text">Content</div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const picContainer = document.getElementById('profile-pic-container');
        if (picContainer) {
            const profileImg = document.createElement('img');
            profileImg.src = 'sepino.png';
            profileImg.alt = 'Foto Profil';

            profileImg.onload = function() {
                picContainer.appendChild(profileImg);
                setTimeout(() => {
                    profileImg.classList.add('loaded');
                }, 50);
            };

            profileImg.onerror = function() {
                picContainer.style.display = 'none'; // Sembunyikan jika gambar gagal dimuat
            };
        }
    });

    // Data dinamis untuk masing-masing course
    const courseData = {
        html: {
            title: "Course Details: HTML",
            duration: "2 jam 45 menit",
            level: "Beginner + Intermediate",
            release: "27 Maret 2023",
            desc: "HTML adalah dasar dari pengembangan website. Dalam kursus ini, Anda akan belajar membuat struktur HTML yang baik dengan fokus pada markup semantik agar dapat dipahami oleh manusia dan mesin.",
            obj: "- Sintaks dasar elemen HTML\n- Memformat konten\n- Menampilkan gambar\n- Membuat tautan\n- Atribut HTML global\n- Membangun navigasi\n- Struktur konten\n- Membuat form\n- Membuat tabel",
            skills: "Skills Covered:\n\n- HTML5\n- Semantic Markup"
        },
        css: {
            title: "Course Details: CSS",
            duration: "2 jam 45 menit",
            level: "Beginner + Intermediate",
            release: "27 Maret 2023",
            desc: "CSS digunakan untuk mendesain dan mengatur tata letak halaman web. Anda akan belajar styling, Flexbox, Grid, dan membuat website responsif yang tampak modern.",
            obj: "- Sintaks dasar CSS\n- Box Model & Layout\n- Flexbox & CSS Grid\n- Typography & Colors\n- Responsive Web Design (Media Queries)\n- Transisi & Animasi dasar",
            skills: "Skills Covered:\n\n- CSS3\n- Responsive Design\n- UI/UX Basics"
        },
        js: {
            title: "Course Details: JavaScript",
            duration: "2 jam 45 menit",
            level: "Beginner + Intermediate",
            release: "27 Maret 2023",
            desc: "JavaScript adalah bahasa pemrograman yang membuat website menjadi interaktif. Pelajari dasar pemrograman, manipulasi DOM, hingga mengambil data dari API.",
            obj: "- Variabel, Tipe Data, dan Operator\n- Struktur Kontrol (If/Else, Loops)\n- Fungsi & Scope\n- Manipulasi DOM\n- Event Handling\n- ES6+ Features\n- Asynchronous JS (Fetch API)",
            skills: "Skills Covered:\n\n- JavaScript (ES6+)\n- DOM Manipulation\n- Asynchronous Programming"
        }
    };

    let currentCourse = 'html';

    function loadContent(courseKey, btnElement) {
        currentCourse = courseKey;

        // Memperbarui state tombol yang aktif
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');

        // Menjalankan animasi transisi
        const container = document.getElementById('content-container');
        container.classList.remove('animate-content');
        void container.offsetWidth; // Memicu reflow browser agar animasi ter-reset & bisa dimainkan ulang
        container.classList.add('animate-content');

        // Memperbarui konten UI secara dinamis
        const data = courseData[courseKey];
        document.getElementById('course-title').innerText = data.title;
        document.getElementById('course-duration').innerText = "Durasi: " + data.duration;
        document.getElementById('course-level').innerText = "Level: " + data.level;
        document.getElementById('course-release').innerText = "Rilis: " + data.release;
    }

    function openModal(title, content) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-body').innerText = content;
        document.getElementById('custom-modal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('custom-modal').classList.remove('show');
    }

    // Menutup modal jika user melakukan klik di luar area konten modal
    window.onclick = function(event) {
        const modal = document.getElementById('custom-modal');
        if (event.target == modal) {
            closeModal();
        }
    }

    function showDescription() {
        openModal("Deskripsi Course", courseData[currentCourse].desc);
    }

    function showObjectives() {
        openModal("Learning Objectives", courseData[currentCourse].obj);
    }

    function showSkills() {
        openModal("Skills Covered", courseData[currentCourse].skills);
    }
</script>

</body>
</html>
